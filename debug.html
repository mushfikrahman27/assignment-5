<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-btn { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .result { margin: 20px 0; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Dashboard Test</h1>
    
    <button class="test-btn" onclick="testAuth()">Test Authentication</button>
    <button class="test-btn" onclick="setAuth()">Set Authentication</button>
    <button class="test-btn" onclick="testAPI()">Test API</button>
    <button class="test-btn" onclick="goToDashboard()">Go to Dashboard</button>
    
    <div id="result" class="result">Click buttons to test...</div>
    
    <script>
        function testAuth() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            document.getElementById('result').innerHTML = `Authentication status: ${isLoggedIn}`;
        }
        
        function setAuth() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', 'admin');
            document.getElementById('result').innerHTML = 'Authentication set! You can now go to dashboard.';
        }
        
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing API...';
            
            try {
                const response = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues');
                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Full response:', result);
                resultDiv.innerHTML = `
                    <h3>API Success!</h3>
                    <p>Status: ${response.status}</p>
                    <p>Issues count: ${result.data ? result.data.length : 0}</p>
                    <p>First issue: ${result.data && result.data[0] ? result.data[0].title : 'None'}</p>
                `;
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
